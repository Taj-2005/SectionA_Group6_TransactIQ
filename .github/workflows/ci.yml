name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic import smoke test
        run: |
          python -c "import pandas, numpy, scipy, statsmodels, matplotlib, seaborn; print('imports_ok')"

